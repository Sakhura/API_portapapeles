<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLIP-O-MATIC 3000</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Scanlines overlay -->
  <div class="scanlines"></div>

  <div class="monitor">
    <div class="monitor-inner">

      <!-- Header -->
      <header>
        <div class="blink">▶</div>
        <h1>CLIP-O-MATIC <span class="version">3000</span></h1>
        <div class="blink">◀</div>
      </header>

      <p class="subtitle">[ CLIPBOARD API — DEMO SYSTEM v1.0 ]</p>

      <!-- Panel principal -->
      <div class="panel">

        <!-- Bloque 1: Escribir y copiar -->
        <div class="block">
          <label for="inputOrigen" class="label-retro">
            <span class="prompt">C:\&gt;</span> ESCRIBE TU TEXTO:
          </label>
          <textarea id="inputOrigen" placeholder="Ingresa el texto aquí..."></textarea>
          <button id="btnCopiar" class="btn" onclick="copiarTexto()">
            [ COPIAR AL PORTAPAPELES ]
          </button>
          <div id="mensajeCopiar" class="mensaje"></div>
        </div>

        <!-- Separador -->
        <div class="separador">
          <span>══════ TRANSFER ══════</span>
        </div>

        <!-- Bloque 2: Pegar -->
        <div class="block">
          <label for="inputDestino" class="label-retro">
            <span class="prompt">C:\&gt;</span> TEXTO PEGADO:
          </label>
          <textarea id="inputDestino" placeholder="El texto pegado aparecerá aquí..." readonly></textarea>
          <button id="btnPegar" class="btn btn-paste" onclick="pegarTexto()">
            [ PEGAR DESDE PORTAPAPELES ]
          </button>
          <div id="mensajePegar" class="mensaje"></div>
        </div>

      </div>

      <!-- Footer -->
      <footer>
        <span class="blink-slow">■</span>
        SISTEMA LISTO — CLIPBOARD API ACTIVA
        <span class="blink-slow">■</span>
      </footer>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
